# POI 테이블 — poi_id → {표시명, floor, pose(x, y, theta), type}
#
# 출처: Interaction 측 self.locations (robot2=1층, robot4=2층). 동일 원본 동기화(정의서 §2.1).
#   - floor: 1(robot2) / 2(robot4).
#   - pose:  각 층 맵 기준 좌표. 모든 지점 방향 NORTH → theta=0.0 rad.
#   - type:  FINAL / HANDOVER / STANDBY / BASE (FMS 디스패치가 type으로 인계·대기·복귀 지점 조회).
#
# ⚠️ type은 Interaction 원본에 없어 릴레이 모델 기준으로 FMS가 추론 배정한 값이다(검토 필요):
#   - HANDOVER = lift  (1층, robot2가 고객을 인계하는 층간 연결 지점)
#   - STANDBY  = lift2 (2층, robot4가 인계 대기하는 지점)
#   - BASE     = station(robot2) / station2(robot4) — config.ROBOTS.base_poi와 일치시킬 것
#   - 그 외    = FINAL (최종 목적지)

pois:
  # ── Floor 1 (robot2) ────────────────────────────────────────────────
  entrance:
    name_ko: "정문 입구"
    name_en: "Entrance"
    type: FINAL
    floor: 1
    pose: { x: -8.05, y: 2.56, theta: 0.0 }
  WC:
    name_ko: "화장실"
    name_en: "Restroom"
    type: FINAL
    floor: 1
    pose: { x: -7.23, y: 1.37, theta: 0.0 }
  info:
    name_ko: "안내데스크"
    name_en: "Information"
    type: FINAL
    floor: 1
    pose: { x: -5.12, y: 3.2, theta: 0.0 }
  entrance2:
    name_ko: "보조 입구"
    name_en: "Entrance 2"
    type: FINAL
    floor: 1
    pose: { x: -0.991, y: 2.48, theta: 0.0 }
  lift:
    name_ko: "엘리베이터(1층)"
    name_en: "Lift (F1)"
    type: HANDOVER        # 층간 인계 지점(start_robot 도착)
    floor: 1
    pose: { x: -2.86, y: 3.82, theta: 0.0 }
  esc:
    name_ko: "에스컬레이터(1층)"
    name_en: "Escalator (F1)"
    type: FINAL
    floor: 1
    pose: { x: -5.0, y: 1.3, theta: 0.0 }
  station:
    name_ko: "robot2 충전/복귀 스테이션"
    name_en: "Robot2 Station"
    type: BASE            # robot2 RETURN_TO_BASE 목적지
    floor: 1
    pose: { x: -3.2, y: 2.12, theta: 0.0 }

  # ── Floor 2 (robot4) ────────────────────────────────────────────────
  lift2:
    name_ko: "엘리베이터(2층)"
    name_en: "Lift (F2)"
    type: STANDBY         # next_robot 인계 대기 지점(MOVE_TO_STANDBY 목적지)
    floor: 2
    pose: { x: -1.75, y: 1.25, theta: 0.0 }
  esc2:
    name_ko: "에스컬레이터(2층)"
    name_en: "Escalator (F2)"
    type: FINAL
    floor: 2
    pose: { x: -0.25, y: 1.25, theta: 0.0 }
  trans:
    name_ko: "환승 지점"
    name_en: "Transfer"
    type: FINAL
    floor: 2
    pose: { x: -0.5, y: 3.5, theta: 0.0 }
  gate:
    name_ko: "게이트"
    name_en: "Gate"
    type: FINAL
    floor: 2
    pose: { x: -1.8, y: 2.0, theta: 0.0 }
  gate_b:
    name_ko: "게이트 B"
    name_en: "Gate B"
    type: FINAL
    floor: 2
    pose: { x: -1.3, y: 2.0, theta: 0.0 }
  pl_1:
    name_ko: "플랫폼 1"
    name_en: "Platform 1"
    type: FINAL
    floor: 2
    pose: { x: -3.0, y: 3.23, theta: 0.0 }
  pl_2:
    name_ko: "플랫폼 2"
    name_en: "Platform 2"
    type: FINAL
    floor: 2
    pose: { x: -3.0, y: 2.8, theta: 0.0 }
  pl_3:
    name_ko: "플랫폼 3"
    name_en: "Platform 3"
    type: FINAL
    floor: 2
    pose: { x: -3.0, y: 2.25, theta: 0.0 }
  station2:
    name_ko: "robot4 충전/복귀 스테이션"
    name_en: "Robot4 Station"
    type: BASE            # robot4 RETURN_TO_BASE 목적지
    floor: 2
    pose: { x: -2.25, y: 3.0, theta: 0.0 }
