<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FMS 관제 로그인</title>
<style>
  :root{--bg:#0f1420;--panel:#182030;--line:#2b3650;--txt:#e8edf6;--dim:#8a97b0;
        --accent:#5b8def;--red:#e05a5a;--green:#3fb27f}
  *{box-sizing:border-box}
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
       background:var(--bg);color:var(--txt);
       font-family:"Noto Sans CJK KR","Apple SD Gothic Neo",system-ui,sans-serif}
  .card{width:340px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
        padding:28px 26px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:22px}
  label{display:block;font-size:12px;color:var(--dim);margin:14px 0 6px}
  input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
        background:#0e1422;color:var(--txt);font-size:14px;outline:none}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:22px;padding:11px;border:0;border-radius:8px;
         background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  button:hover{filter:brightness(1.08)}
  .err{margin-top:14px;color:var(--red);font-size:12.5px;display:none}
  .err.show{display:block}
  .foot{margin-top:18px;color:var(--dim);font-size:11px;text-align:center}
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>FMS 관제 대시보드</h1>
    <div class="sub">다중 로봇 릴레이 에스코트 · 로그인</div>
    <label for="user">아이디</label>
    <input id="user" name="user" autocomplete="username" autofocus required>
    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <div id="err" class="err">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <button type="submit">로그인</button>
    <div class="foot">관리자 전용 · 시연 LAN</div>
  </form>
<script>
  if(new URLSearchParams(location.search).get('e')) document.getElementById('err').classList.add('show');
</script>
</body>
</html>
