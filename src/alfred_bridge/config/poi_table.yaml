# POI 테이블 — poi_id → {표시명, floor, robot, type, pose(x, y, theta)}
#
# 시연 맵 기준 실좌표(Interaction 트랙 locations 원본에서 이식).
#   - floor: 가상 층(BRD: 단일 층을 Zone으로 분할해 층간 이동 시뮬레이션).
#   - robot: 해당 POI를 담당하는 로봇(floor 1=robot2, floor 2=robot4) — 정보용.
#   - pose:  맵 기준 좌표. theta 라디안. (방향은 모두 NORTH=0.0rad)
#   - type:  FINAL(목적지) / HANDOVER(층간 환승) / STANDBY(next_robot 대기) / BASE(복귀).
#
# 릴레이 로직(mission_manager): first_of_type("HANDOVER")=lift, first_of_type("STANDBY")=lift2.
# base_poi(config.ROBOTS): robot2=station, robot4=station2.

pois:
  # ══════════ Floor 1 (robot2) ══════════
  entrance:
    name_ko: "정문 입구"
    type: FINAL
    floor: 1
    robot: robot2
    pose: { x: -8.05, y: 2.56, theta: 0.0 }
  WC:
    name_ko: "화장실"
    type: FINAL
    floor: 1
    robot: robot2
    pose: { x: -7.23, y: 1.37, theta: 0.0 }
  info:
    name_ko: "안내데스크"
    type: FINAL
    floor: 1
    robot: robot2
    pose: { x: -5.12, y: 3.2, theta: 0.0 }
  entrance2:
    name_ko: "보조 입구"
    type: FINAL
    floor: 1
    robot: robot2
    pose: { x: -0.991, y: 2.48, theta: 0.0 }
  esc:
    name_ko: "에스컬레이터(1층)"
    type: FINAL
    floor: 1
    robot: robot2
    pose: { x: -5.0, y: 1.3, theta: 0.0 }
  lift:
    name_ko: "엘리베이터(1층) — 환승 지점"
    type: HANDOVER          # start_robot(robot2) 고객 인계 지점
    floor: 1
    robot: robot2
    pose: { x: -2.86, y: 3.82, theta: 0.0 }
  station:
    name_ko: "robot2 복귀 스테이션"
    type: BASE              # config.ROBOTS["robot2"].base_poi
    floor: 1
    robot: robot2
    pose: { x: -3.2, y: 2.12, theta: 0.0 }

  # ══════════ Floor 2 (robot4) ══════════
  lift2:
    name_ko: "엘리베이터(2층) — 대기 지점"
    type: STANDBY           # next_robot(robot4) 인수 대기 지점
    floor: 2
    robot: robot4
    pose: { x: -1.75, y: 1.25, theta: 0.0 }
  esc2:
    name_ko: "에스컬레이터(2층)"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -0.25, y: 1.25, theta: 0.0 }
  trans:
    name_ko: "환승 구역"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -0.5, y: 3.5, theta: 0.0 }
  gate:
    name_ko: "게이트"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -1.8, y: 2.0, theta: 0.0 }
  gate_b:
    name_ko: "게이트 B"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -1.3, y: 2.0, theta: 0.0 }
  pl_1:
    name_ko: "플랫폼 1"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -3.0, y: 3.23, theta: 0.0 }
  pl_2:
    name_ko: "플랫폼 2"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -3.0, y: 2.8, theta: 0.0 }
  pl_3:
    name_ko: "플랫폼 3"
    type: FINAL
    floor: 2
    robot: robot4
    pose: { x: -3.0, y: 2.25, theta: 0.0 }
  station2:
    name_ko: "robot4 복귀 스테이션"
    type: BASE              # config.ROBOTS["robot4"].base_poi
    floor: 2
    robot: robot4
    pose: { x: -2.25, y: 3.0, theta: 0.0 }
