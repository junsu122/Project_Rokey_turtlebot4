# ────────────────────────────────────────────────────────────────────────
# 브리지 설정 템플릿 (로봇 유닛 ↔ FMS)
#
# 이 파일은 각 로봇 유닛의 "연산 PC"에서 도는 브리지 노드(ROS ↔ MQTT/IF 변환)의
# 설정이다. 로봇 트랙(Driving/Interaction/Vision)이 자기 ROS 토픽 이름을 채워
# 완성한다. 로봇 한 대 = 이 블록 하나(복사해서 robot_id/도메인/토픽만 교체).
#
# 역할 분담:
#   - FMS 측 확정(고정): MQTT 토픽(robot/{id}/...), IF-01~05 JSON 형식, QoS
#       → docs/INTERFACE_CONTRACT.md 참조. 이 칸들은 건드리지 말 것.
#   - 로봇 트랙이 채울 칸: ros_topic, ros_type  (아래 TODO)
#
# 브리지가 하는 일 = 양방향 번역:
#   ros→mqtt : ROS 토픽 구독 → IF JSON으로 포장 → robot/{id}/... 발행
#   mqtt→ros : robot/{id}/task 구독 → ROS 토픽으로 재발행(Driving이 수행)
# ────────────────────────────────────────────────────────────────────────

# ── 유닛 식별 ─────────────────────────────────────────────────────────────
robot_id: robot2                 # FMS가 보는 식별자(= MQTT 토픽 {id}). robot2 / robot4
ros_namespace: /robot2           # 이 유닛의 ROS 네임스페이스
ros_domain_id: 2                 # 현재 공유=2. 도메인 분리 후 개별 값으로 교체.

# ── 브로커 접속 (FMS 호스트 PC) ──────────────────────────────────────────
broker:
  host: 192.168.0.20             # TODO: FMS 호스트 PC의 고정 IP
  port: 1883
  client_id: bridge_robot2       # ⚠ 유닛마다 유일해야 함(FMS=fms_server와도 달라야)
  keepalive: 60

# ── IF ↔ ROS 토픽 매핑 (★ 로봇 트랙이 ros_topic / ros_type 채움) ─────────
# mqtt_topic / qos / direction 은 계약 고정값(수정 금지).
mappings:

  # IF-02 로봇 상태 보고 (로봇 → FMS). task 결과(task_status)도 이 채널로 보고.
  IF-02_status:
    direction: ros2mqtt
    mqtt_topic: robot/robot2/status
    qos: 0
    ros_topic: ""                # TODO 예: /robot2/state  (상태+pose+battery+task_status)
    ros_type: ""                 # TODO 예: 커스텀 msg 또는 std_msgs/String(JSON)
    # 발행 규칙: 1~2Hz 주기 + 상태 전이/ task_status 변화 시 즉시(핸드오버 3초 측정 전제)

  # IF-01 고객 요청 (Interaction → FMS). ESCORT/CANCEL.
  IF-01_request:
    direction: ros2mqtt
    mqtt_topic: robot/robot2/request
    qos: 1
    ros_topic: ""                # TODO 예: /robot2/interaction/request
    ros_type: ""                 # TODO

  # IF-05 이상 상황 알림 (Vision/YOLO → FMS). FIRE / SUSPICIOUS_PERSON.
  IF-05_event:
    direction: ros2mqtt
    mqtt_topic: robot/robot2/event
    qos: 1
    ros_topic: ""                # TODO 예: /robot2/vision/alert
    ros_type: ""                 # TODO

  # IF-03 임무 할당 (FMS → 로봇). 브리지가 MQTT로 받아 ROS 토픽으로 재발행 → Driving 수행.
  IF-03_task:
    direction: mqtt2ros
    mqtt_topic: robot/robot2/task
    qos: 1
    ros_topic: ""                # TODO 예: /robot2/fms/task  (Driving이 구독)
    ros_type: ""                 # TODO

  # task_ack 수락/거절 (로봇 → FMS). Driving이 task 수신 시 ACCEPT/REJECT 발행.
  task_ack:
    direction: ros2mqtt
    mqtt_topic: robot/robot2/task_ack
    qos: 1
    ros_topic: ""                # TODO 예: /robot2/fms/task_ack
    ros_type: ""                 # TODO

# ── 멱등(중복 처리) — driving 계약에 항상 포함 (계약 §1.3) ───────────────
# QoS 1은 중복 배달 가능 → 로봇은 이미 처리한 task_id 재수신 시 무시할 것.
# 거절 규칙(계약 §6.2): PATROL/IDLE 상태에서 받은 ESCORT 계열 task는 REJECT.

# ── (선택) 영상 — 제어 평면 아님. 별도 데이터 평면(WebRTC 등)에서 처리 ───
# 카메라 라이브 영상은 이 브리지(IF/MQTT)를 거치지 않는다. 아키텍처 다이어그램 참조.
# video:
#   ros_image_topic: /robot2/oakd/rgb/image_raw   # WebRTC/web_video_server 송신원
#   transport: webrtc                              # 관리자 UI로 직접(FMS 우회)
