<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FMS 관제 대시보드</title>
<style>
  :root{
    --bg:#0f1420; --panel:#182030; --panel2:#1e2740; --line:#2b3650;
    --txt:#e8edf6; --dim:#8a97b0; --accent:#5b8def;
    --gray:#6b7689; --blue:#5b8def; --amber:#e0a83b; --green:#3fb27f; --red:#e05a5a; --purple:#9b6ad6;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font-family:"Noto Sans CJK KR","Apple SD Gothic Neo",system-ui,sans-serif;font-size:14px}
  header{display:flex;align-items:center;gap:14px;padding:12px 20px;
         background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header h1{font-size:17px;margin:0;font-weight:700}
  .sub{color:var(--dim);font-size:12px}
  .conn{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--gray)}
  .dot.ok{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.bad{background:var(--red);box-shadow:0 0 8px var(--red)}
  main{padding:18px;max-width:1200px;margin:0 auto}
  .grid{display:grid;gap:16px}
  .robots{grid-template-columns:1fr 1fr}
  .bottom{grid-template-columns:1fr 1fr}
  section{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
  section h2{font-size:13px;margin:0 0 12px;color:var(--dim);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  /* 로봇 카드 */
  .robot{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}
  .robot .top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .robot .rid{font-size:16px;font-weight:700}
  .badge{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#0c0f16}
  .badge.gray{background:var(--gray)} .badge.blue{background:var(--blue)}
  .badge.amber{background:var(--amber)} .badge.green{background:var(--green)}
  .badge.red{background:var(--red);color:#fff} .badge.purple{background:var(--purple)}
  .kv{display:flex;justify-content:space-between;padding:3px 0;color:var(--dim);font-size:13px}
  .kv b{color:var(--txt);font-weight:600}
  .batt{height:8px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:2px}
  .batt > i{display:block;height:100%;background:var(--green)}
  .stale{color:var(--red);font-weight:700}
  /* 미션 */
  .trail{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 9px;font-size:12px;color:var(--dim)}
  .chip.cur{border-color:var(--accent);color:var(--txt)}
  .lat{font-weight:700} .lat.ok{color:var(--green)} .lat.over{color:var(--red)}
  .m-meta{display:flex;flex-wrap:wrap;gap:9px 18px;align-items:center;margin-top:12px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 12px}
  .stat b{margin-left:4px}
  .m-sub{color:var(--dim);font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin:16px 0 7px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:600}
  td.mono{font-family:ui-monospace,monospace;color:var(--dim)}
  .ev{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
  .muted{color:var(--dim)}
  .empty{color:var(--dim);padding:8px 2px}
  .logout{margin-left:14px;color:var(--dim);font-size:12px;text-decoration:none;
          border:1px solid var(--line);padding:4px 11px;border-radius:6px}
  .logout:hover{color:var(--txt);border-color:var(--accent)}
  .searchbar{display:flex;gap:10px;margin-bottom:6px}
  .searchbar input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--line);
                   background:#0e1422;color:var(--txt);font-size:13px;outline:none}
  .searchbar input:focus{border-color:var(--accent)}
  .searchbar select{padding:9px 10px;border-radius:8px;border:1px solid var(--line);
                    background:#0e1422;color:var(--txt);font-size:13px}
  .sr-group h3{font-size:12px;color:var(--dim);margin:12px 0 6px;font-weight:600}
  @media(max-width:760px){.robots,.bottom,.maps{grid-template-columns:1fr}}
  /* 맵 */
  .maps{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .map-title{font-size:13px;margin-bottom:8px;color:var(--dim)}
  .map-title b{color:var(--txt)}
  .map-stage{position:relative;width:100%;background:#0a0e16;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .map-img{display:block;width:100%;image-rendering:pixelated}
  .rdot{position:absolute;width:13px;height:13px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);box-shadow:0 0 7px rgba(0,0,0,.7);z-index:2}
  .rdot.gray{background:var(--gray)} .rdot.blue{background:var(--blue)} .rdot.amber{background:var(--amber)}
  .rdot.green{background:var(--green)} .rdot.red{background:var(--red)}
  .rdot .lbl{position:absolute;left:50%;bottom:15px;transform:translateX(-50%);font-size:10px;font-weight:700;
             white-space:nowrap;color:var(--txt);background:rgba(15,20,32,.85);padding:1px 5px;border-radius:4px}
  .rdot .head{position:absolute;left:50%;top:50%;width:11px;height:2px;background:#fff;transform-origin:left center}
  .map-off{position:absolute;right:6px;bottom:5px;font-size:10px;color:var(--amber);background:rgba(15,20,32,.7);padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<header>
  <h1>FMS 관제 대시보드</h1>
  <span class="sub">다중 로봇 릴레이 에스코트</span>
  <div class="conn"><span id="dot" class="dot"></span><span id="connTxt">연결 중…</span>
    <span id="updated" class="sub"></span></div>
  <a class="logout" href="/logout">로그아웃</a>
</header>
<main>
  <section>
    <h2>로봇 (실시간 · IF-02)</h2>
    <div id="robots" class="grid robots"></div>
  </section>
  <section>
    <h2>맵 · 실시간 위치</h2>
    <div id="maps" class="maps"></div>
  </section>
  <section>
    <h2>활성 / 최근 미션 (Mission State — FMS 단독 소유)</h2>
    <div id="mission"></div>
  </section>
  <div class="grid bottom">
    <section>
      <h2>미션 이력</h2>
      <div id="history"></div>
    </section>
    <section>
      <h2>이상감지 (IF-05)</h2>
      <div id="events"></div>
    </section>
  </div>
  <section>
    <h2>검색 (DB 기록)</h2>
    <div class="searchbar">
      <input id="q" placeholder="미션ID · 상태 · 목적지 · 로봇 · 이벤트 · task 키워드…">
      <select id="kind">
        <option value="all">전체</option>
        <option value="missions">미션</option>
        <option value="events">이벤트</option>
        <option value="tasks">task</option>
      </select>
    </div>
    <div id="search-res"></div>
  </section>
</main>

<script>
const TIMEOUT = 10;            // last_seen STALE 임계(초)
const HANDOVER_TARGET = 3000;  // ms

const ROBOT_CLASS = {
  PATROL:'gray', IDLE:'gray', INTERACTING:'blue', RESERVED:'amber',
  HANDOVER_READY:'amber', WAITING_HANDOVER:'amber', ESCORTING:'green',
  RETURNING:'green', EMERGENCY:'red', ERROR:'red'
};
const MISSION_CLASS = {
  REQUESTED:'blue', ASSIGNED:'blue', ESCORTING_TO_HANDOVER:'amber',
  HANDOVER_WAITING:'amber', ESCORTING_TO_FINAL:'green', COMPLETED:'green',
  CANCELLED:'red', EMERGENCY:'red', FAILED:'red'
};
const el = id => document.getElementById(id);
const esc = s => String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
async function j(p){
  const r = await fetch(p,{cache:'no-store'});
  if(r.status===401){ location.href='/login'; throw 0; }  // 세션 만료 → 로그인
  if(!r.ok) throw 0;
  return r.json();
}
function ageSec(ls){ if(!ls) return null; return (Date.now()-new Date(ls).getTime())/1000; }
function shortId(id){ return id ? String(id).split('_').slice(-2).join('_') : '—'; }
function num(n){ return (typeof n === 'number') ? n.toFixed(2) : '0.00'; }
function fmtTime(s){ if(!s) return '—'; const d=new Date(s); return isNaN(d)?'—':d.toLocaleTimeString('ko-KR'); }

function setConn(ok){
  el('dot').className = 'dot ' + (ok?'ok':'bad');
  el('connTxt').textContent = ok ? 'FMS 연결됨' : 'FMS 연결 안됨';
}
function setUpdated(){ el('updated').textContent = '· ' + new Date().toLocaleTimeString('ko-KR'); }

function renderRobots(robots){
  if(!robots || !robots.length){ el('robots').innerHTML = '<div class="empty">로봇 보고 없음</div>'; return; }
  el('robots').innerHTML = robots.map(r=>{
    const cls = ROBOT_CLASS[r.state] || 'gray';
    const a = ageSec(r.last_seen);
    const seen = a==null ? '—' : (a>TIMEOUT ? `<span class="stale">${a.toFixed(1)}s STALE</span>` : `${a.toFixed(1)}s 전`);
    const b = r.battery==null ? 0 : r.battery;
    const p = r.pose||{};
    const task = r.current_task_id ? `${esc(shortId(r.current_task_id))} <span class="muted">(${esc(r.task_status||'')})</span>` : '<span class="muted">순찰/대기</span>';
    return `<div class="robot">
      <div class="top"><span class="rid">${esc(r.robot_id)}</span>
        <span class="badge ${cls}">${esc(r.state||'?')}</span></div>
      <div class="kv"><span>task</span><b>${task}</b></div>
      <div class="kv"><span>pose</span><b>x ${num(p.x)} · y ${num(p.y)} · θ ${num(p.theta)}</b></div>
      <div class="kv"><span>battery</span><b>${b}%</b></div>
      <div class="batt"><i style="width:${b}%;background:${b<20?'var(--red)':'var(--green)'}"></i></div>
      <div class="kv" style="margin-top:8px"><span>last seen</span><b>${seen}</b></div>
    </div>`;
  }).join('');
}

const TERMINAL = ['COMPLETED','CANCELLED','EMERGENCY','FAILED'];
function renderMission(cur, detail){
  if(!cur){ el('mission').innerHTML = '<div class="empty">활성 미션 없음 — 요청 대기 중</div>'; return; }
  const cls = MISSION_CLASS[cur.state] || 'gray';
  const lat = cur.handover_latency_ms;
  const done = TERMINAL.includes(cur.state);
  const latHtml = lat!=null
    ? `<span class="lat ${lat<=HANDOVER_TARGET?'ok':'over'}">${lat} ms</span> <span class="muted">(목표 ≤ ${HANDOVER_TARGET})</span>`
    : (done ? '<span class="muted">핸드오버 없음 (같은 층)</span>' : '<span class="muted">측정 전</span>');
  const trs = (detail && detail.transitions) || [];
  const trail = trs.length ? `<div class="trail">${trs.map((t,i)=>
      `<span class="chip ${i===trs.length-1?'cur':''}">${esc(t.to_state)}</span>`).join('')}</div>`
    : '<div class="muted">—</div>';
  const tasks = (detail && detail.tasks) || [];
  const taskHtml = tasks.length ? `<table><tr><th>task</th><th>로봇</th><th>ack(수락)</th><th>결과</th></tr>${
    tasks.map(t=>{
      let res = t.final_status || '';
      if(!res) res = (t.task_type==='RETURN_TO_BASE' ? '<span class="muted">복귀(미션 외)</span>' : '<span class="muted">진행 중</span>');
      return `<tr><td>${esc(t.task_type)}</td><td>${esc(t.robot_id)}</td><td>${esc(t.ack||'—')}</td><td>${res}</td></tr>`;
    }).join('')}</table>` : '<div class="muted">—</div>';
  el('mission').innerHTML = `
    <div class="m-head" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span class="badge ${cls}">${esc(cur.state)}</span>
      <span class="muted mono">${esc(cur.mission_id)}</span>
    </div>
    <div class="m-meta">
      <span>start <b>${esc(cur.start_robot)}</b> → next <b>${esc(cur.next_robot||'—')}</b></span>
      <span>목적지 <b>${esc(cur.dest_poi)}</b></span>
      <span class="stat">핸드오버 지연 ·<b>${latHtml}</b></span>
    </div>
    <div class="m-sub">전이 (Mission State)</div>
    ${trail}
    <div class="m-sub">발행 task (IF-03)</div>
    ${taskHtml}`;
}

function renderHistory(missions){
  if(!missions || !missions.length){ el('history').innerHTML = '<div class="empty">없음</div>'; return; }
  el('history').innerHTML = `<table><tr><th>미션</th><th>상태</th><th>경로</th><th>지연</th><th>생성</th></tr>${
    missions.slice(0,8).map(m=>{
      const cls = MISSION_CLASS[m.state]||'gray';
      const lat = m.handover_latency_ms==null?'—':m.handover_latency_ms+'ms';
      return `<tr><td class="mono">${esc(shortId(m.mission_id))}</td>
        <td><span class="badge ${cls}">${esc(m.state)}</span></td>
        <td>${esc(m.start_robot)}→${esc(m.next_robot||'—')}</td>
        <td>${lat}</td><td class="muted">${fmtTime(m.created_at)}</td></tr>`;
    }).join('')}</table>`;
}

function renderEvents(events){
  if(!events || !events.length){ el('events').innerHTML = '<div class="empty">없음</div>'; return; }
  el('events').innerHTML = events.map(e=>`
    <div class="ev"><span class="badge red">${esc(e.event_type)}</span>
      <span><b>${esc(e.robot_id)}</b> <span class="muted">conf ${esc(e.confidence)} · floor ${esc(e.floor)}</span></span>
      <span class="muted" style="margin-left:auto">${fmtTime(e.at)}</span></div>`).join('');
}

// ── 맵 (한 번 로드 후 dot만 갱신) ──────────────────────────────────────
let MAPS = null;
async function loadMaps(){
  try{
    MAPS = await j('/api/maps');
    if(!MAPS.floors || !MAPS.floors.length){ el('maps').innerHTML='<div class="empty">맵 없음</div>'; return; }
    el('maps').innerHTML = MAPS.floors.map(f=>`
      <div class="mapwrap">
        <div class="map-title">${f.floor}층 · <b>${esc(f.robot_id)}</b></div>
        <div class="map-stage" id="stage-${esc(f.robot_id)}">
          <img class="map-img" src="/${f.image}" alt="floor ${f.floor}">
        </div>
      </div>`).join('');
  }catch(e){ el('maps').innerHTML='<div class="empty">맵 로드 실패</div>'; }
}
function renderRobotOnMap(robots){
  if(!MAPS || !MAPS.floors) return;
  const byId={}; robots.forEach(r=>{ byId[r.robot_id]=r; });
  MAPS.floors.forEach(f=>{
    const stage=document.getElementById('stage-'+f.robot_id);
    if(!stage) return;
    const od=stage.querySelector('.rdot'); if(od) od.remove();
    const oo=stage.querySelector('.map-off'); if(oo) oo.remove();
    const r=byId[f.robot_id];
    if(!r || !r.pose || typeof r.pose.x!=='number') return;
    // world(m) → 픽셀 → % (이미지 y축 뒤집힘)
    const px=(r.pose.x - f.origin[0]) / f.resolution;
    const py=f.height - (r.pose.y - f.origin[1]) / f.resolution;
    let left=px/f.width*100, top=py/f.height*100;
    const off=(left<0||left>100||top<0||top>100);
    left=Math.max(1.5,Math.min(98.5,left)); top=Math.max(1.5,Math.min(98.5,top));
    const cls=ROBOT_CLASS[r.state]||'gray';
    const ang=-(r.pose.theta||0)*180/Math.PI;   // 화면 각도(시계방향+)
    const dot=document.createElement('div');
    dot.className='rdot '+cls;
    dot.style.left=left+'%'; dot.style.top=top+'%';
    dot.innerHTML=`<span class="head" style="transform:rotate(${ang}deg)"></span>`+
      `<span class="lbl">${esc(r.robot_id)} · ${esc(r.state)}</span>`;
    stage.appendChild(dot);
    if(off){ const o=document.createElement('div'); o.className='map-off'; o.textContent='맵 밖 (pose 0,0?)'; stage.appendChild(o); }
  });
}

async function tick(){
  try{
    const [robots, missions, events] = await Promise.all([
      j('/api/robots'), j('/api/missions'), j('/api/events?limit=8')
    ]);
    setConn(true);
    renderRobots(robots);
    renderRobotOnMap(robots);
    const act = (missions.active && missions.active[0]) || (missions.missions && missions.missions[0]) || null;
    let detail = null;
    if(act){ try{ detail = await j('/api/missions/'+act.mission_id); }catch(e){} }
    renderMission(act, detail);
    renderHistory(missions.missions||[]);
    renderEvents(events);
    setUpdated();
  }catch(e){ setConn(false); }
}
// ── 검색 (DB 기록) ────────────────────────────────────────────────────
function renderSearch(d){
  if(!d.q){ el('search-res').innerHTML=''; return; }
  const r=d.results||{}, m=r.missions||[], e=r.events||[], t=r.tasks||[];
  if(!m.length && !e.length && !t.length){
    el('search-res').innerHTML='<div class="empty">결과 없음 — "'+esc(d.q)+'"</div>'; return; }
  let h='';
  if(m.length){ h+='<div class="sr-group"><h3>미션 '+m.length+'</h3><table>'+
    '<tr><th>미션</th><th>상태</th><th>경로</th><th>목적지</th><th>지연</th><th>생성</th></tr>'+
    m.map(x=>`<tr><td class="mono">${esc(shortId(x.mission_id))}</td>`+
      `<td><span class="badge ${MISSION_CLASS[x.state]||'gray'}">${esc(x.state)}</span></td>`+
      `<td>${esc(x.start_robot)}→${esc(x.next_robot||'—')}</td><td>${esc(x.dest_poi)}</td>`+
      `<td>${x.handover_latency_ms==null?'—':x.handover_latency_ms+'ms'}</td>`+
      `<td class="muted">${fmtTime(x.created_at)}</td></tr>`).join('')+'</table></div>'; }
  if(e.length){ h+='<div class="sr-group"><h3>이벤트 '+e.length+'</h3><table>'+
    '<tr><th>type</th><th>로봇</th><th>conf</th><th>floor</th><th>시각</th></tr>'+
    e.map(x=>`<tr><td><span class="badge red">${esc(x.event_type)}</span></td>`+
      `<td>${esc(x.robot_id)}</td><td>${esc(x.confidence)}</td><td>${esc(x.floor)}</td>`+
      `<td class="muted">${fmtTime(x.at)}</td></tr>`).join('')+'</table></div>'; }
  if(t.length){ h+='<div class="sr-group"><h3>task '+t.length+'</h3><table>'+
    '<tr><th>task</th><th>로봇</th><th>미션</th><th>ack</th><th>결과</th></tr>'+
    t.map(x=>`<tr><td>${esc(x.task_type)}</td><td>${esc(x.robot_id)}</td>`+
      `<td class="mono">${esc(shortId(x.mission_id))}</td><td>${esc(x.ack||'—')}</td>`+
      `<td>${esc(x.final_status||'—')}</td></tr>`).join('')+'</table></div>'; }
  el('search-res').innerHTML=h;
}
async function doSearch(){
  const q=el('q').value.trim(), kind=el('kind').value;
  if(!q){ el('search-res').innerHTML=''; return; }
  try{ renderSearch(await j('/api/search?q='+encodeURIComponent(q)+'&kind='+kind)); }
  catch(err){ el('search-res').innerHTML='<div class="empty">검색 실패</div>'; }
}
let _searchTimer;
el('q').addEventListener('input', ()=>{ clearTimeout(_searchTimer); _searchTimer=setTimeout(doSearch, 300); });
el('kind').addEventListener('change', doSearch);

loadMaps(); tick(); setInterval(tick, 1000);
</script>
</body>
</html>
