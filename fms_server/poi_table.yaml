# POI 테이블 — poi_id → {표시명, floor, pose(x, y, theta)}
#
# ⚠️ 값 대기(스코프 §9): 좌표/층은 시연 맵 작성 후 채운다. 아래는 **구조 스텁**이다.
#   - floor: 가상 층(BRD: 단일 층을 Zone으로 분할해 층간 이동 시뮬레이션).
#            로봇은 물리 좌표만 보고하고 zone→가상층 변환은 FMS 매핑 담당(정의서 부록 B).
#   - pose:  각 층 맵 기준 좌표. theta 라디안.
#   - type:  FINAL / HANDOVER / STANDBY / BASE 구분 (핸드오버·대기·복귀 지점 포함).
#
# 타 트랙(Interaction)에 배포되는 POI 목록도 이 원본에서 생성한다(정의서 §2.1).
# Interaction용 파일에는 동의어(synonyms)·표시명을 추가로 포함시킨다.

pois:
  # ── 최종 목적지 예시 ──────────────────────────────────────────────────
  GATE_30:
    name_ko: "30번 게이트"
    name_en: "Gate 30"
    type: FINAL
    floor: 2          # TODO: 시연 가상층 확정
    pose: { x: 0.0, y: 0.0, theta: 0.0 }   # TODO: 맵 좌표
    synonyms: ["게이트 삼십", "30번 게이트", "gate thirty"]  # Interaction 배포용

  # ── 핸드오버(층간 연결) 지점 ──────────────────────────────────────────
  HANDOVER_1_2:
    name_ko: "1-2층 연결 지점"
    name_en: "Floor 1-2 Connection"
    type: HANDOVER
    floor: 1          # 출발 측(start_robot 도착 지점)
    pose: { x: 0.0, y: 0.0, theta: 0.0 }   # TODO

  # ── next_robot 대기 지점(MOVE_TO_STANDBY 목적지) ────────────────────
  STANDBY_2:
    name_ko: "2층 대기 지점"
    name_en: "Floor 2 Standby"
    type: STANDBY
    floor: 2
    pose: { x: 0.0, y: 0.0, theta: 0.0 }   # TODO

  # ── 복귀(순찰 홈) 지점 — RETURN_TO_BASE 목적지 ──────────────────────
  BASE_A:
    name_ko: "로봇 A 복귀 지점"
    name_en: "Robot A Base"
    type: BASE
    floor: 1
    pose: { x: 0.0, y: 0.0, theta: 0.0 }   # TODO
  BASE_B:
    name_ko: "로봇 B 복귀 지점"
    name_en: "Robot B Base"
    type: BASE
    floor: 2
    pose: { x: 0.0, y: 0.0, theta: 0.0 }   # TODO
